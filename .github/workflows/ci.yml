name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build Backend Image
      - name: Build Backend Docker Image
        run: |
          docker build -t ${{ secrets.ECR_BACKEND_REPOSITORY }}:latest ./research-backend

      # Tag Backend Image
      - name: Tag Backend Docker Image
        run: |
          docker tag ${{ secrets.ECR_BACKEND_REPOSITORY }}:latest \
          ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_BACKEND_REPOSITORY }}:latest

      # Push Backend Image
      - name: Push Backend Docker Image
        run: |
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_BACKEND_REPOSITORY }}:latest

      # Build Frontend Image
      - name: Build Frontend Docker Image
        run: |
          docker build -t ${{ secrets.ECR_FRONTEND_REPOSITORY }}:latest ./research-frontend

      # Tag Frontend Image
      - name: Tag Frontend Docker Image
        run: |
          docker tag ${{ secrets.ECR_FRONTEND_REPOSITORY }}:latest \
          ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_FRONTEND_REPOSITORY }}:latest

      # Push Frontend Image
      - name: Push Frontend Docker Image
        run: |
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_FRONTEND_REPOSITORY }}:latest

      - name: Success Message
        run: echo "Docker images pushed successfully to Amazon ECR!"